<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f3f4f6;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:30px;
}

/* Input Section */

.note-input{
display:flex;
gap:10px;
margin-bottom:25px;
}

textarea{
flex:1;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
resize:none;
height:60px;
}

button{
padding:10px 15px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1e4fd6;
}

/* Notes Grid */

.notes{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.note{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
position:relative;
}

.delete{
position:absolute;
top:10px;
right:10px;
cursor:pointer;
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Notes App</h1>

<div class="note-input">

<textarea id="noteText" placeholder="Write your note..."></textarea>

<button onclick="addNote()">Add</button>

</div>

<div class="notes" id="notesContainer"></div>

</div>

<script>

let notes = JSON.parse(localStorage.getItem("notes")) || [];

function saveNotes(){
localStorage.setItem("notes", JSON.stringify(notes));
}

function renderNotes(){

const container=document.getElementById("notesContainer");
container.innerHTML="";

notes.forEach((note,index)=>{

const div=document.createElement("div");
div.className="note";

div.innerHTML=`
<span class="delete" onclick="deleteNote(${index})">×</span>
<p>${note}</p>
`;

container.appendChild(div);

});

}

function addNote(){

const text=document.getElementById("noteText").value.trim();

if(text===""){
alert("Write a note first");
return;
}

notes.push(text);
saveNotes();
renderNotes();

document.getElementById("noteText").value="";

}

function deleteNote(index){

notes.splice(index,1);
saveNotes();
renderNotes();

}

renderNotes();

</script>

</body>
</html>
